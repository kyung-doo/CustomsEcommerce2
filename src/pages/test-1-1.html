<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인쇄 전용 페이지</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layouts.css">
    <link rel="stylesheet" href="../css/pages.css">
    <style>
        /* 인쇄 시 특정 영역만 보이도록 */
        @media print {
            body * { visibility: hidden; }
            .cont-area123, .cont-area123 * { visibility: visible; }
            .cont-area123 { position: absolute; top: 0; left: 0; width: 100%; }
        }

        /* 안내 문구 스타일 */
        #mobilePrintNotice {
            display: block;
            text-align: center;
            padding: 20px;
            background: #fffae6;
            border: 1px solid #ffd700;
            font-size: 16px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <!-- 인쇄할 영역 -->
    <div class="cont-area123">
        <h1>인쇄할 내용</h1>
        <p>이 영역만 인쇄됩니다.</p>
    </div>

    <!-- 모바일 안내 문구 -->
    <div id="mobilePrintNotice">
        모바일에서는 브라우저 메뉴(⋮) → <strong>인쇄</strong> 버튼을 눌러주세요.
    </div>
</body>
</html>
